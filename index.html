<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CBSE Homework AI</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f4f7fb;
padding:20px;
}

.container{
max-width:520px;
margin:auto;
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

h1{
text-align:center;
color:#4f46e5;
margin-bottom:8px;
}

p{
text-align:center;
margin-bottom:20px;
color:#555;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#4f46e5;
color:#fff;
font-size:16px;
font-weight:600;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#4338ca;
}

#dashboard{
display:none;
}

.class-btn{
margin:8px 0;
}

.success{
display:none;
margin-top:15px;
text-align:center;
color:green;
font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<div id="registration">

<h1>CBSE Homework AI</h1>

<p>Register once to start your FREE Trial.</p>

<input
type="text"
id="name"
placeholder="Student Name"
required>

<input
type="tel"
id="mobile"
placeholder="Mobile Number"
required>

<input
type="email"
id="email"
placeholder="Email Address"
required>

<button onclick="registerStudent()">
Start Free Trial
</button>

<div class="success" id="success">
Registration Successful...
Opening Dashboard...
</div>

</div>

<div id="dashboard">

<h1>Welcome</h1>

<p>Select Your Class</p>

<button class="class-btn" id="class6">
Class 6
</button>

<button class="class-btn" id="class7">
Class 7
</button>

<button class="class-btn" id="class8">
Class 8
</button>

<button class="class-btn" id="class9">
Class 9
</button>

<button class="class-btn" id="class10">
Class 10
</button>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
