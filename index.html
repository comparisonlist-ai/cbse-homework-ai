<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f46e5">

<title>CBSE Homework AI | Class 6–10</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
color:#222;
padding:18px;
}

.container{
max-width:760px;
margin:auto;
background:#fff;
border-radius:16px;
padding:24px;
box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.logo{
font-size:30px;
font-weight:700;
text-align:center;
color:#4f46e5;
}

.tagline{
text-align:center;
margin-top:8px;
color:#666;
font-size:15px;
line-height:1.6;
}

.badge{
margin:18px auto;
display:inline-block;
padding:8px 18px;
background:#eef2ff;
color:#4f46e5;
border-radius:50px;
font-size:14px;
font-weight:600;
}

.center{
text-align:center;
}

.card{
background:#fff;
border:1px solid #ececec;
border-radius:12px;
padding:18px;
margin-top:20px;
}

input,
textarea,
select{

width:100%;
padding:13px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
margin-top:12px;

}

input:focus,
textarea:focus{

outline:none;
border-color:#4f46e5;

}

button{

width:100%;
padding:13px;
border:none;
border-radius:8px;
margin-top:14px;
font-size:15px;
font-weight:600;
cursor:pointer;
transition:.25s;

}

.primary{
background:#4f46e5;
color:#fff;
}

.primary:hover{
background:#4338ca;
}

.secondary{
background:#6b7280;
color:#fff;
}

.success{
background:#16a34a;
color:#fff;
}

.warning{
background:#ea580c;
color:#fff;
}

.hidden{
display:none !important;
}

hr{
margin:20px 0;
border:none;
border-top:1px solid #eee;
}

.subject-grid{
display:grid;
grid-template-columns:1fr;
gap:12px;
margin-top:18px;
}

@media(min-width:640px){

.subject-grid{
grid-template-columns:1fr 1fr;
}

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
CBSE Homework AI
</div>

<div class="tagline">
AI Homework Assistant for CBSE Students (Class 6–10)
</div>

<div class="center">
<div class="badge">
🎉 Register & Start Your 7-Day FREE Trial
</div>
</div>

<!-- ========================= -->
<!-- REGISTRATION -->
<!-- ========================= -->

<div id="registration" class="card">

<h2>Student Registration</h2>

<p style="margin-top:10px;color:#666;">
Register once and access unlimited learning during your FREE Trial.
</p>

<input
type="text"
id="name"
placeholder="Student Name">

<input
type="tel"
id="mobile"
maxlength="10"
placeholder="Mobile Number">

<input
type="email"
id="email"
placeholder="Email Address">

<button
class="success"
onclick="registerStudent()">

🚀 Start FREE Trial

</button>

<hr>

<p class="center" style="color:#666;font-size:14px;">
Already Registered?
</p>

<button
class="secondary"
onclick="showDashboard()">

📚 Open Dashboard

</button>

</div>
