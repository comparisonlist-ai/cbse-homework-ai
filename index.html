<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CBSE Homework AI</title>
  <style>
    /* Reset & Base Styles */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f9fafb;
      color: #111827;
      padding: 20px;
    }

    /* Main Container - Non-centered alignment as requested */
    .app-container {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      max-width: 600px;
      margin: 40px auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }

    /* Header styling matching 'Select Your Class' */
    .section-title {
      font-size: 20px;
      font-weight: 600;
      color: #111827;
      text-align: left;
      margin-bottom: 16px;
    }

    /* Button Group Layout */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    /* Vibrant, High-Contrast Buttons */
    .btn {
      display: inline-block;
      padding: 14px 20px;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.2s ease;
      cursor: pointer;
    }

    .btn-primary {
      background-color: #7c3aed; /* Vibrant purple */
      color: #ffffff;
    }

    .btn-primary:hover {
      background-color: #6d28d9;
    }

    .btn-secondary {
      background-color: #1f2937; /* Dark high-contrast slate */
      color: #ffffff;
    }

    .btn-secondary:hover {
      background-color: #111827;
    }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- Section Title -->
    <h2 class="section-title">Select Your Class</h2>
    
    <!-- Action Buttons -->
    <div class="button-group">
      <a href="YOUR_GOOGLE_FORM_URL" class="btn btn-primary" target="_blank">Register for 7-Day Free Trial</a>
      <a href="YOUR_APP_URL" class="btn btn-secondary">I Have Registered, Open App 🚀</a>
    </div>
  </div>

</body>
</html>
